name: Build & Release

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Rust backend + Tauri ─────────────────────────────────────────────────
  build:
    name: Build Tauri (${{ matrix.os }})
    needs: [frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        include:
          - os: ubuntu-latest
            apt_deps: >-
              libwebkit2gtk-4.1-dev
              libgtk-3-dev
              libayatana-appindicator3-dev
              librsvg2-dev
              patchelf
              libssl-dev
              pkg-config
              file
              curl
              xvfb
            display: ': xvfb-run -a'
            tauri_args: ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt_deps }}

      - name: Install frontend deps
        run: npm ci

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # ── Tauri signing: generate key if not exists ──────────────────────
      - name: Setup Tauri signing key
        id: tauri-key
        env:
          # 私钥写入 GitHub Secret: TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.tauri/
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "$TAURI_SIGNING_PRIVATE_KEY" > ~/.tauri/_private_key.pem
            echo "key_file=~/.tauri/private_key.pem" >> $GITHUB_OUTPUT
          else
            echo "No signing key found. Build will proceed without signing."
            echo "key_file=" >> $GITHUB_OUTPUT
          fi

      - name: Rust setup
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri (debug)
        env:
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ steps.tauri-key.outputs.key_file }}
        run: |
          ${{ matrix.display }} npm run tauri build -- --debug ${{ matrix.tauri_args }}
        working-directory: .

      - name: Build Tauri (release)
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        env:
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ steps.tauri-key.outputs.key_file }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ${{ matrix.display }} npm run tauri build -- ${{ matrix.tauri_args }}
        working-directory: .

      - name: Upload release artifacts
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/OpenDiff*.exe
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            src-tauri/target/release/.fingerprint/**/log
          retention-days: 7

  # ── Release ──────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event.inputs.version != '')
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -z "$VERSION" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "tagged=${{ startsWith(github.ref, 'refs/tags/v') }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version.outputs.tagged == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            OpenDiff*.deb
            OpenDiff*.rpm
            OpenDiff*.AppImage
            OpenDiff*.msi
            OpenDiff*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        if: steps.version.outputs.tagged != 'true'
        run: |
          echo "No tag found. Artifacts available for manual download."
          echo "To create a release, push a tag: git tag v${{ steps.version.outputs.VERSION || '0.1.0' }} && git push origin v${{ steps.version.outputs.VERSION || '0.1.0' }}"
